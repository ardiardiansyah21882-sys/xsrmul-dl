<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XsRmul Video Downloader</title>
    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #22d3ee; margin-bottom: 5px; font-style: italic; text-shadow: 0 0 10px rgba(34, 211, 238, 0.3); }
        p.subtitle { color: #94a3b8; font-size: 10px; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, #0891b2, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        #loading { color: #22d3ee; margin-top: 15px; display: none; font-size: 14px; font-style: italic; }
        #result { margin-top: 25px; display: none; }
        .dl-btn {
            background: #22c55e;
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
        }
        footer { margin-top: 40px; text-align: center; font-size: 10px; color: #64748b; line-height: 1.5; }
        .author { color: #22d3ee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>XsRmul DL</h1>
        <p class="subtitle">Video Downloader Engine</p>

        <input type="text" id="urlInput" placeholder="Tempel link video di sini...">
        <button onclick="prosesDownload()" id="btnDl">GENERATE LINK</button>

        <div id="loading">Sabar, lagi narik data... 🗿</div>

        <div id="result">
            <a id="downloadLink" href="#" target="_blank" class="dl-btn">DOWNLOAD VIDEO ↓</a>
        </div>
    </div>

    <footer>
        &copy; 2026 <span class="author">Abdurrahman Mulia</span><br>
        Made with ❤️ in Barabai, HST
    </footer>

    <script>
        async function prosesDownload() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('result');
            const load = document.getElementById('loading');
            const btn = document.getElementById('btnDl');

            if (!url) return alert("Isi linknya dulu bos! 🗿");

            load.style.display = 'block';
            res.style.display = 'none';
            btn.disabled = true;

            try {
                let finalUrl = "";
                
                // JIKA LINK TIKTOK (Pakai Server TikWM - No Watermark)
                if (url.includes("tiktok.com")) {
                    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    finalUrl = data.data?.play || data.data?.wmplay;
                } 
                // JIKA LINK YT / LAINNYA (Pakai Server Vreden)
                else {
                    const response = await fetch(`https://api.vreden.my.id/api/download?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    finalUrl = data.result?.url || data.result?.videoUrl || data.result?.mp4;
                }

                if (finalUrl) {
                    document.getElementById('downloadLink').href = finalUrl;
                    res.style.display = 'block';
                } else {
                    alert("Gagal ambil video. Server mungkin lagi penuh, coba link lain. 🗿");
                }
            } catch (e) {
                alert("Koneksi ditolak! Pastikan internetmu aktif ya.");
            } finally {
                load.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
