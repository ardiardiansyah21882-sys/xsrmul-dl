<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XsRmul Downloaderv2</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px 30px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #30363d; }
        .title { font-size: 36px; font-weight: bold; font-style: italic; color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.7); }
        .subtitle { font-size: 11px; letter-spacing: 2px; color: #00d2ff; background: rgba(0, 210, 255, 0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 10px 0 30px 0; }
        input { width: 100%; padding: 18px; background: #0d1117; border: 1px solid #30363d; border-radius: 15px; color: white; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .btn-generate { width: 100%; padding: 18px; background: linear-gradient(90deg, #0099ff, #00d2ff); border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; }
        #hasil { margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; display: none; }
        .btn-save { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #fff; color: #0d1117; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .footer { margin-top: 40px; font-size: 10px; color: #8b949e; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">XsRmul DL</div>
        <div class="subtitle">TIKTOK DOWNLOADER</div>
        <input type="text" id="urlInput" placeholder="Tempel link TikTok di sini...">
        <button class="btn-generate" onclick="proses()">GENERATE LINK</button>
        <div id="hasil"></div>
    </div>
    <div class="footer">© 2026 Abdurrahman Mulia<br>XsRmul Project - Barabai, HST</div>

    <script>
        async function proses() {
            const input = document.getElementById('urlInput');
            const resBox = document.getElementById('hasil');
            const url = input.value.trim();
            if(!url) return alert("Linknya mana?");

            resBox.style.display = "block";
            resBox.innerHTML = "⌛ Menghubungkan ke Server...";

            try {
                // API Cadangan yang lebih stabil
                const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if(data.status === 200) {
                    resBox.innerHTML = `
                        <p style="color:#00d2ff;">✅ Video Ditemukan!</p>
                        <a href="${data.result.video.noWatermark}" class="btn-save" download>UNDUH VIDEO</a>
                    `;
                } else {
                    resBox.innerHTML = "❌ Video tidak ditemukan atau privat.";
                }
            } catch (e) {
                resBox.innerHTML = "⚠️ Server Sibuk. Coba klik lagi!";
            }
        }
    </script>
</body>
</html>
