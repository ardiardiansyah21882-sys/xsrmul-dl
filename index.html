<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XsRmul Downloaderv2</title>
    <style>
        /* CSS Desain XsRmul DL v2 */
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #161b22;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            font-style: italic;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 2px;
            color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 18px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #0099ff, #00d2ff);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 153, 255, 0.3);
        }

        .btn-generate:active { transform: scale(0.97); }

        #hasil {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: none;
            font-size: 13px;
            border: 1px dashed #30363d;
        }

        .btn-save {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #ffffff;
            color: #0d1117;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #8b949e;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">XsRmul DL</div>
        <div class="subtitle">TIKTOK • YOUTUBE • FB • IG</div>

        <input type="text" id="urlInput" placeholder="Tempel link video di sini...">
        
        <button class="btn-generate" onclick="prosesDownload()">GENERATE LINK</button>

        <div id="hasil"></div>
    </div>

    <div class="footer">
        © 2026 Abdurrahman Mulia<br>
        XsRmul Project - Made in Barabai, HST
    </div>

    <script>
        async function prosesDownload() {
            const urlInput = document.getElementById('urlInput');
            const boxHasil = document.getElementById('hasil');
            let rawUrl = urlInput.value;

            // Bersihkan link dari teks tambahan
            const match = rawUrl.match(/(https?:\/\/[^\s]+)/g);
            const url = match ? match[0] : null;

            if (!url) {
                alert("Tempel linknya dulu, Bang!");
                return;
            }

            boxHasil.style.display = "block";
            boxHasil.innerHTML = "<p>⏳ Generating Link...</p>";

            try {
                // Gunakan API Tiklydown
                const res = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.status === 200) {
                    boxHasil.innerHTML = `
                        <p style="color: #00d2ff;">✅ Video Ready!</p>
                        <p style="opacity:0.7;">${data.result.description?.substring(0, 50) || 'TikTok Video'}...</p>
                        <a href="${data.result.video.noWatermark}" class="btn-save" target="_blank">UNDUH VIDEO</a>
                    `;
                } else {
                    boxHasil.innerHTML = "❌ Gagal. Pastikan link video publik.";
                }
            } catch (e) {
                boxHasil.innerHTML = `
                    <div style="color: #ffcc00; font-size: 12px;">
                        ⚠️ Masalah Jaringan (CORS).<br>
                        Aplikasi ini butuh Hosting (Vercel) agar jalan normal.
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
