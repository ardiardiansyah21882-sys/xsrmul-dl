<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XsRmul DL - TikTok Downloader</title>
    <meta name="description" content="Download TikTok No Watermark by Abdurrahman Mulia">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { color: #22d3ee; margin-bottom: 5px; font-style: italic; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(to right, #0891b2, #2563eb); color: white; font-weight: bold; cursor: pointer; }
        #loading { color: #22d3ee; margin-top: 15px; display: none; }
        #result { margin-top: 25px; display: none; }
        .dl-btn { background: #22c55e; padding: 15px 25px; border-radius: 50px; color: white; text-decoration: none; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>XsRmul DL</h1>
        <p style="font-size:10px; color:#94a3b8; letter-spacing:2px;">VIDEO DOWNLOADER ENGINE</p>
        <input type="text" id="urlInput" placeholder="Tempel link di sini...">
        <button onclick="prosesDownload()">GENERATE LINK</button>
        <div id="loading">Sabar, lagi narik data... 🗿</div>
        <div id="result">
            <a id="downloadLink" href="#" target="_blank" class="dl-btn">DOWNLOAD VIDEO ↓</a>
        </div>
    </div>
    <footer style="margin-top:40px; text-align:center; font-size:10px; color:#64748b;">
        &copy; 2026 <span style="color:#22d3ee">Abdurrahman Mulia</span><br>Made with ❤️ in Barabai, HST
    </footer>
    <script>
        async function prosesDownload() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('result');
            const load = document.getElementById('loading');
            if (!url) return alert("Isi linknya dulu bos! 🗿");
            load.style.display = 'block'; res.style.display = 'none';
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                const video = data.data?.play || data.data?.wmplay;
                if (video) {
                    document.getElementById('downloadLink').href = video;
                    res.style.display = 'block';
                } else { alert("Gagal ambil video. Coba link lain!"); }
            } catch (e) { alert("Koneksi API bermasalah!"); } finally { load.style.display = 'none'; }
        }
    </script>
</body>
</html>
