<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>XsRmul DL - Download Video TikTok Tanpa Watermark</title>
    <meta name="description" content="XsRmul DL adalah alat pengunduh video TikTok tanpa watermark tercepat dan gratis. Dibuat dengan cinta di Barabai, HST.">
    <meta name="keywords" content="download tiktok, tiktok downloader, tt mp4, xsrmul dl, download video tiktok barabai">
    <meta name="author" content="Abdurrahman Mulia">
    
    <meta property="og:title" content="XsRmul DL - TikTok Downloader">
    <meta property="og:description" content="Download video TikTok tanpa watermark gratis dan cepat.">
    <meta property="og:url" content="https://xsrmul-dl.vercel.app">
    <meta property="og:type" content="website">

    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px 30px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .title { font-size: 36px; font-weight: bold; font-style: italic; color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.5); margin-bottom: 5px; }
        .subtitle { font-size: 10px; letter-spacing: 1px; color: #00d2ff; background: rgba(0, 210, 255, 0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 18px; background: #0d1117; border: 1px solid #30363d; border-radius: 15px; color: white; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #00d2ff; }
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, #0099ff, #00d2ff); border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:active { transform: scale(0.98); }
        #hasil { margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; display: none; }
        .dl-btn { display: inline-block; margin-top: 15px; padding: 15px 25px; background: #28a745; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .footer { margin-top: 40px; font-size: 10px; color: #8b949e; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">XsRmul DL</div>
        <div class="subtitle">Video Downloader Engine</div>
        
        <input type="text" id="linkInput" placeholder="Tempel link video di sini...">
        <button onclick="unduh()">GENERATE LINK</button>
        
        <div id="hasil"></div>
    </div>

    <div class="footer">
        © 2026 <b>Abdurrahman Mulia</b><br>
        Made with ❤️ in Barabai, HST
    </div>

    <script>
        async function unduh() {
            const input = document.getElementById('linkInput').value;
            const resBox = document.getElementById('hasil');
            if(!input) return alert("Masukkan linknya dulu, Bos!");

            resBox.style.display = "block";
            resBox.innerHTML = "⌛ Sedang memproses video...";

            try {
                // API Pro
                const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(input)}`);
                const data = await response.json();

                if(data.status === 200) {
                    resBox.innerHTML = `
                        <p style="color:#00d2ff; font-weight:bold;">✅ Video Ready!</p>
                        <a href="${data.result.video.noWatermark}" class="dl-btn" target="_blank">DOWNLOAD VIDEO ↓</a>
                    `;
                } else {
                    resBox.innerHTML = "❌ Gagal mengambil data. Coba link lain.";
                }
            } catch (e) {
                resBox.innerHTML = "⚠️ Masalah koneksi API. Klik lagi!";
            }
        }
    </script>

</body>
</html>
